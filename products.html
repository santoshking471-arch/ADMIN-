<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Products</title>

<style>
body{
  font-family:Arial;
  background:#f1f5f9;
  padding:10px;
}

.topbar{
  background:white;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:8px;
  margin-top:5px;
}

.card{
  background:white;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
}

img{
  width:80px;
  border-radius:5px;
}

button{
  padding:6px;
  margin:3px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.deleteBtn{ background:red; color:white; }
.editBtn{ background:orange; color:white; }
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<h2>📦 Manage Products</h2>

<div class="topbar">
  <b>Total Products: <span id="totalProducts">0</span></b>
  <input type="text" id="search" placeholder="Search product..." oninput="filterProducts()">
</div>

<div id="productList"></div>

<script>
// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCA49EYDbqUnYu1sXs0ETDMIGaWxtoxXOM",
  authDomain: "reselling-store-c103e.firebaseapp.com",
  databaseURL: "https://reselling-store-c103e-default-rtdb.firebaseio.com",
  projectId: "reselling-store-c103e",
  storageBucket: "reselling-store-c103e.firebasestorage.app",
  messagingSenderId: "411682468136",
  appId: "1:411682468136:web:79cc2b622148f42a62e01d"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

// 🔐 ADMIN LIST
const ADMIN_EMAILS = ["santoshking471@gmail.com", "sidarrani368@gmail.com"];

let allProducts = [];

// 🔐 ADMIN CHECK
auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  // ✅ Multi-admin support fix
  if (!ADMIN_EMAILS.includes(user.email.toLowerCase())) {
    alert("Not Admin 😤");
    auth.signOut();
    window.location.href = "index.html";
    return;
  }

  console.log("Admin Verified ✅");
  loadProducts();
});

// 🔥 LOAD PRODUCTS
function loadProducts() {
  db.collection("products").onSnapshot(snap => {
    allProducts = [];
    snap.forEach(doc => {
      allProducts.push({
        id: doc.id,
        ...doc.data()
      });
    });

    document.getElementById("totalProducts").innerText = allProducts.length;
    renderProducts(allProducts);
  }, error => {
    console.error("Error:", error);
    document.getElementById("productList").innerHTML = "Permission Denied ❌ Check Firebase Rules.";
  });
}

// 🔍 SEARCH
function filterProducts() {
  let text = document.getElementById("search").value.toLowerCase();
  let filtered = allProducts.filter(p =>
    (p.name || "").toLowerCase().includes(text)
  );
  renderProducts(filtered);
}

// 🎨 RENDER
function renderProducts(list) {
  let html = "";
  if (list.length === 0) {
    document.getElementById("productList").innerHTML = "No products found 😐";
    return;
  }

  list.forEach((p, index) => {
    html += `
    <div class="card">
      <b>${index + 1}. ${p.name || "No Name"}</b><br>
      <img src="${p.image || 'https://via.placeholder.com/80'}" style="margin:10px 0;"><br>
      ₹${p.price || "0"}<br><br>

      <button class="editBtn" onclick="editProduct('${p.id}', '${p.name}', '${p.price}', '${p.image}')">✏ Edit</button>
      <button class="deleteBtn" onclick="deleteProduct('${p.id}')">🗑 Delete</button>
    </div>
    `;
  });

  document.getElementById("productList").innerHTML = html;
}

// 🗑 DELETE
function deleteProduct(id) {
  if (confirm("Delete product? 😐")) {
    db.collection("products").doc(id).delete();
  }
}

// ✏ EDIT
function editProduct(id, name, price, image) {
  let newName = prompt("Edit Name:", name);
  let newPrice = prompt("Edit Price:", price);
  let newImage = prompt("Edit Image URL:", image);

  if (newName && newPrice && newImage) {
    db.collection("products").doc(id).update({
      name: newName,
      price: newPrice,
      image: newImage
    }).then(() => {
      alert("Product updated! ✅");
    }).catch(err => {
      alert("Update failed ❌");
    });
  }
}
</script>

</body>
</html>
