<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Users</title>

<style>
body{
  font-family:Arial;
  background:#f1f5f9;
  padding:10px;
}

.topbar{
  background:white;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:8px;
  margin-top:5px;
}

.card{
  background:white;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
}

button{
  padding:6px;
  margin:3px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.deleteBtn{ background:red; color:white; }
.blockBtn{ background:orange; color:white; }
.viewBtn{ background:#2874f0; color:white; }

.orderBox{
  background:#eef;
  padding:8px;
  margin-top:5px;
  border-radius:6px;
}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<h2>👤 Manage Users</h2>

<div class="topbar">
  <b>Total Users: <span id="totalUsers">0</span></b>
  <input type="text" id="search" placeholder="Search email..." oninput="filterUsers()">
</div>

<div id="userList"></div>

<script>

// 🔥 CONFIG
const firebaseConfig = {
apiKey: "AIzaSyCA49EYDbqUnYu1sXs0ETDMIGaWxtoxXOM",
authDomain: "reselling-store-c103e.firebaseapp.com",
projectId: "reselling-store-c103e"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

const ADMIN_EMAIL = "santoshking471@gmail.com";

let allUsers = [];

// 🔐 ADMIN CHECK
auth.onAuthStateChanged(user=>{
  if(!user){
    window.location.href="index.html";
    return;
  }

  if(user.email !== ADMIN_EMAIL){
    alert("Not Admin 😤");
    auth.signOut();
    return;
  }

  loadUsers();
});

// 🔥 LOAD USERS
function loadUsers(){

  db.collection("users").onSnapshot(snap=>{

    allUsers = [];
    snap.forEach(doc=>{
      let u = doc.data();

      // ❌ admin hide
      if(u.email === ADMIN_EMAIL) return;

      allUsers.push({
        id: doc.id,
        ...u
      });
    });

    document.getElementById("totalUsers").innerText = allUsers.length;

    renderUsers(allUsers);
  });

}

// 🔍 SEARCH FILTER
function filterUsers(){
  let text = document.getElementById("search").value.toLowerCase();

  let filtered = allUsers.filter(u =>
    (u.email || "").toLowerCase().includes(text)
  );

  renderUsers(filtered);
}

// 🎨 RENDER USERS
function renderUsers(list){

  let html = "";
  let count = 1;

  list.forEach(u=>{

    html += `
    <div class="card">
      <b>${count}. ${u.email}</b><br>
      UID: ${u.id}<br><br>

      <button class="viewBtn" onclick="viewOrders('${u.id}')">📦 Orders</button>
      <button class="deleteBtn" onclick="deleteUser('${u.id}')">🗑 Delete</button>
      <button class="blockBtn" onclick="toggleBlock('${u.id}', ${u.blocked ? true : false})">
        ${u.blocked ? "🔓 Unblock" : "🚫 Block"}
      </button>

      <div id="orders-${u.id}"></div>
    </div>
    `;

    count++;
  });

  document.getElementById("userList").innerHTML = html;
}

// 🗑 DELETE
function deleteUser(id){
  if(confirm("Delete user? 😐")){
    db.collection("users").doc(id).delete();
  }
}

// 🚫 BLOCK
function toggleBlock(id, status){
  db.collection("users").doc(id).update({
    blocked: !status
  });
}

// 📦 VIEW ORDERS
function viewOrders(uid){

  let box = document.getElementById("orders-"+uid);

  if(box.innerHTML !== ""){
    box.innerHTML = "";
    return;
  }

  db.collection("orders")
  .where("userId","==",uid)
  .onSnapshot(snap=>{

    let html = "<b>User Orders:</b>";

    snap.forEach(doc=>{
      let o = doc.data();

      html += `
      <div class="orderBox">
        ${o.productName} - ₹${o.productPrice}
      </div>`;
    });

    if(snap.empty){
      html += "<p>No orders 😐</p>";
    }

    box.innerHTML = html;

  });

}

</script>

</body>
</html>
