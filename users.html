<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Users</title>

<style>
body{
  font-family:Arial;
  background:#f1f5f9;
  padding:10px;
}

.topbar{
  background:white;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
}

input{
  width:100%;
  padding:8px;
  margin-top:5px;
}

.card{
  background:white;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
}

button{
  padding:6px;
  margin:3px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.deleteBtn{ background:red; color:white; }
.blockBtn{ background:orange; color:white; }
.viewBtn{ background:#2874f0; color:white; }

.orderBox{
  background:#eef;
  padding:8px;
  margin-top:5px;
  border-radius:6px;
}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<h2>👤 Manage Users</h2>

<div class="topbar">
  <b>Total Users: <span id="totalUsers">0</span></b>
  <input type="text" id="search" placeholder="Search email..." oninput="filterUsers()">
</div>

<div id="userList"></div>

<script>
// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCA49EYDbqUnYu1sXs0ETDMIGaWxtoxXOM",
  authDomain: "reselling-store-c103e.firebaseapp.com",
  databaseURL: "https://reselling-store-c103e-default-rtdb.firebaseio.com",
  projectId: "reselling-store-c103e",
  storageBucket: "reselling-store-c103e.firebasestorage.app",
  messagingSenderId: "411682468136",
  appId: "1:411682468136:web:79cc2b622148f42a62e01d"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

// 🔐 ADMIN LIST
const ADMIN_EMAILS = ["santoshking471@gmail.com", "sidarrani368@gmail.com"];

let allUsers = [];

// 🔐 ADMIN CHECK
auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  // Check if current user is in Admin list
  if (!ADMIN_EMAILS.includes(user.email.toLowerCase())) {
    alert("Not Admin 😤");
    auth.signOut();
    window.location.href = "index.html";
    return;
  }

  console.log("Admin Verified ✅");
  loadUsers();
});

// 🔥 LOAD USERS
function loadUsers() {
  db.collection("users").onSnapshot(snap => {
    allUsers = [];
    snap.forEach(doc => {
      let u = doc.data();

      // ❌ Admins ko user list mein nahi dikhana hai
      if (ADMIN_EMAILS.includes((u.email || "").toLowerCase())) return;

      allUsers.push({
        id: doc.id,
        ...u
      });
    });

    document.getElementById("totalUsers").innerText = allUsers.length;
    renderUsers(allUsers);
  }, error => {
    console.error("Error loading users:", error);
    document.getElementById("userList").innerHTML = "<p style='color:red;'>Permission Denied ❌ Check Firebase Rules.</p>";
  });
}

// 🔍 SEARCH FILTER
function filterUsers() {
  let text = document.getElementById("search").value.toLowerCase();
  let filtered = allUsers.filter(u =>
    (u.email || "").toLowerCase().includes(text)
  );
  renderUsers(filtered);
}

// 🎨 RENDER USERS
function renderUsers(list) {
  let html = "";
  if (list.length === 0) {
    document.getElementById("userList").innerHTML = "<p style='padding:10px;'>No users found 😐</p>";
    return;
  }

  list.forEach((u, index) => {
    html += `
    <div class="card">
      <b>${index + 1}. ${u.email || "No Email"}</b><br>
      <small>UID: ${u.id}</small><br><br>

      <button class="viewBtn" onclick="viewOrders('${u.id}')">📦 Orders</button>
      <button class="deleteBtn" onclick="deleteUser('${u.id}')">🗑 Delete</button>
      <button class="blockBtn" onclick="toggleBlock('${u.id}', ${u.blocked ? true : false})">
        ${u.blocked ? "🔓 Unblock" : "🚫 Block"}
      </button>

      <div id="orders-${u.id}"></div>
    </div>
    `;
  });

  document.getElementById("userList").innerHTML = html;
}

// 🗑 DELETE
function deleteUser(id) {
  if (confirm("Delete user? 😐")) {
    db.collection("users").doc(id).delete();
  }
}

// 🚫 BLOCK
function toggleBlock(id, status) {
  db.collection("users").doc(id).update({
    blocked: !status
  }).then(() => {
    alert(status ? "User Unblocked" : "User Blocked");
  });
}

// 📦 VIEW ORDERS
function viewOrders(uid) {
  let box = document.getElementById("orders-" + uid);
  if (box.innerHTML !== "") {
    box.innerHTML = "";
    return;
  }

  db.collection("orders")
    .where("userId", "==", uid)
    .get() // Yahan get() use karna better hai for single view
    .then(snap => {
      let html = "<div class='orderBox'><b>User Orders:</b><br>";
      if (snap.empty) {
        html += "No orders found 😐";
      } else {
        snap.forEach(doc => {
          let o = doc.data();
          html += `• ${o.productName} - ₹${o.productPrice}<br>`;
        });
      }
      html += "</div>";
      box.innerHTML = html;
    })
    .catch(err => {
      console.error(err);
      box.innerHTML = "<p style='color:red;'>Error loading orders</p>";
    });
}
</script>

        
</body>
</html>
