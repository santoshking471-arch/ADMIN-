<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Orders</title>

<style>
body{
  font-family:Arial;
  background:#f1f5f9;
  padding:10px;
}

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:10px;
}

.tab{
  padding:10px;
  background:white;
  border-radius:6px;
  cursor:pointer;
}

.active{
  background:#2874f0;
  color:white;
}

.card{
  background:white;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
}

button{
  padding:6px;
  margin-top:5px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.confirmBtn{
  background:#22c55e;
  color:white;
}

.deleteBtn{
  background:red;
  color:white;
}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<h2>🛒 Manage Orders</h2>

<div class="tabs">
  <div id="pendingTab" class="tab active" onclick="showTab('pending')">🆕 Pending</div>
  <div id="confirmTab" class="tab" onclick="showTab('confirmed')">✅ Confirmed</div>
</div>

<div id="orderList"></div>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCA49EYDbqUnYu1sXs0ETDMIGaWxtoxXOM",
  authDomain: "reselling-store-c103e.firebaseapp.com",
  databaseURL: "https://reselling-store-c103e-default-rtdb.firebaseio.com",
  projectId: "reselling-store-c103e",
  storageBucket: "reselling-store-c103e.firebasestorage.app",
  messagingSenderId: "411682468136",
  appId: "1:411682468136:web:79cc2b622148f42a62e01d"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

const ADMIN_EMAIL = "santoshking471@gmail.com";

let currentTab = "pending";

// 🔐 ADMIN CHECK
auth.onAuthStateChanged(user=>{
  if(!user){
    window.location.href="index.html";
    return;
  }

  if(user.email !== ADMIN_EMAIL){
    alert("Not Admin 😤");
    auth.signOut();
    return;
  }

  loadOrders();
});

// 🔄 TAB SWITCH
function showTab(tab){
  currentTab = tab;
  renderOrders(); // 👉 reload UI only
}

  document.getElementById("pendingTab").classList.remove("active");
  document.getElementById("confirmTab").classList.remove("active");

  if(tab === "pending"){
    document.getElementById("pendingTab").classList.add("active");
  } else {
    document.getElementById("confirmTab").classList.add("active");
  }

  loadOrders();
}

// 🔥 LOAD ORDERS

     function loadOrders(){

  db.collection("orders")
  .onSnapshot(snap=>{

    let html="";

    snap.forEach(doc=>{
      let o = doc.data();

      // 🔥 SAFE FILTER
      if(currentTab === "pending"){
        if(o.confirmed === true) return;
      }

      if(currentTab === "confirmed"){
        if(o.confirmed !== true) return;
      }

      html += `
      <div class="card">
        <b>${o.productName}</b><br>
        ₹${o.productPrice}<br>
        👤 ${o.name || "-"}<br>
        📧 ${o.email || "-"}<br>
        📞 ${o.mobile || "-"}<br>
        📍 ${o.address || "-"}<br>
      `;

      // 👉 Pending button
      if(o.confirmed !== true){
        html += `
        <button onclick="confirmOrder('${doc.id}')">
          ✔ Confirm
        </button>`;
      }

      // 👉 Confirmed button
      if(o.confirmed === true){
        html += `
        <button onclick="deleteOrder('${doc.id}')">
          🗑 Delete
        </button>`;
      }

      html += `</div>`;
    });

    document.getElementById("orderList").innerHTML = html;

  });

}

// ✅ CONFIRM ORDER
function confirmOrder(id){
  db.collection("orders").doc(id).update({
    confirmed: true
  }).then(()=>{
    console.log("Confirmed:", id);
  }).catch(err=>{
    console.error(err);
  });
}

// 🗑 DELETE ORDER
function deleteOrder(id){
  if(confirm("Delete order? 😐")){
    db.collection("orders").doc(id).delete();
  }
}

</script>

</body>
</html>
