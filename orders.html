<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Orders</title>

<style>
body{
  font-family:Arial;
  background:#f1f5f9;
  padding:10px;
}

.card{
  background:white;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* ✅ DONE = GREEN */
.done{
  background:#dcfce7;
  border-left:5px solid #22c55e;
}

button{
  padding:6px 10px;
  margin-top:5px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.markBtn{
  background:#22c55e;
  color:white;
}

.deleteBtn{
  background:red;
  color:white;
}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<h2>🛒 All Orders</h2>

<div id="orderList"></div>

<script>

// 🔥 CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCA49EYDbqUnYu1sXs0ETDMIGaWxtoxXOM",
  authDomain: "reselling-store-c103e.firebaseapp.com",
  databaseURL: "https://reselling-store-c103e-default-rtdb.firebaseio.com",
  projectId: "reselling-store-c103e",
  storageBucket: "reselling-store-c103e.firebasestorage.app",
  messagingSenderId: "411682468136",
  appId: "1:411682468136:web:79cc2b622148f42a62e01d"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

const ADMIN_EMAIL = "santoshking471@gmail.com";

// 🔐 ADMIN CHECK
auth.onAuthStateChanged(user=>{
  if(!user){
    window.location.href="index.html";
    return;
  }

  if(user.email !== ADMIN_EMAIL){
    alert("Not Admin 😤");
    auth.signOut();
    return;
  }

  loadOrders();
});


// 🔥 LOAD ORDERS (Realtime)
function loadOrders(){

  db.collection("orders")
  .orderBy("createdAt","desc") // optional
  .onSnapshot(snap=>{

    let html = "";

    snap.forEach(doc=>{
      let o = doc.data();
      let id = doc.id;

      // default false
      if(o.done === undefined){
        o.done = false;
      }

      html += `
      <div class="card ${o.done ? 'done' : ''}">
        <b>${o.productName}</b><br>
        ₹${o.productPrice}<br><br>

        👤 ${o.name || "-"}<br>
        📧 ${o.email || "-"}<br>
        📞 ${o.mobile || "-"}<br>
        📍 ${o.address || "-"}<br>
      `;

      // ✅ MARK DONE BUTTON
      if(!o.done){
        html += `
        <button class="markBtn" onclick="markDone('${id}')">
          ✔ Mark Done
        </button>`;
      }

      // 🗑 DELETE
      html += `
      <button class="deleteBtn" onclick="deleteOrder('${id}')">
        🗑 Delete
      </button>
      `;

      html += `</div>`;
    });

    document.getElementById("orderList").innerHTML = html;

  });
}


// ✅ MARK DONE
function markDone(id){
  db.collection("orders").doc(id).update({
    done: true
  });
}


// 🗑 DELETE
function deleteOrder(id){
  if(confirm("Delete order?")){
    db.collection("orders").doc(id).delete();
  }
}

</script>

</body>
</html>
