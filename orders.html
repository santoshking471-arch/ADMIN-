<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  background:#f1f5f9;
  padding:10px;
}

.card{
  background:white;
  padding:12px;
  margin-bottom:10px;
  border-radius:10px;
}

/* ✅ Confirmed = green */
.done{
  background:#bbf7d0;
}

button{
  padding:6px;
  margin-top:6px;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

.confirmBtn{
  background:#22c55e;
  color:white;
}

.deleteBtn{
  background:red;
  color:white;
}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<h2>🛒 All Orders</h2>

<div id="orderList"></div>

<script>

// 🔥 CONFIG (same)
const firebaseConfig = {
  apiKey: "AIzaSyCA49EYDbqUnYu1sXs0ETDMIGaWxtoxXOM",
  authDomain: "reselling-store-c103e.firebaseapp.com",
  projectId: "reselling-store-c103e",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// 🔥 LOAD ORDERS (REALTIME)
db.collection("orders").orderBy("createdAt","desc")
.onSnapshot(snapshot=>{

  let html="";

  snapshot.forEach(doc=>{
    let o = doc.data();

    html += `
    <div class="card ${o.done ? 'done' : ''}">
      <b>${o.productName}</b><br>
      ₹${o.productPrice}<br>

      👤 ${o.name || "-"}<br>
      📧 ${o.email || "-"}<br>
      📞 ${o.mobile || "-"}<br>
      📍 ${o.address || "-"}<br>
    `;

    // ✔ Confirm button (only pending)
    if(!o.done){
      html += `
      <button class="confirmBtn" onclick="confirmOrder('${doc.id}')">
        ✔ Confirm
      </button>`;
    }

    // 🗑 Delete button (always)
    html += `
    <button class="deleteBtn" onclick="deleteOrder('${doc.id}')">
      🗑 Delete
    </button>
    `;

    html += `</div>`;
  });

  if(html===""){
    html = "<p>No Orders 😐</p>";
  }

  document.getElementById("orderList").innerHTML = html;

});

// ✅ CONFIRM = GREEN
function confirmOrder(id){
  db.collection("orders").doc(id).update({
    done: true
  });
}

// ❌ DELETE
function deleteOrder(id){
  if(confirm("Delete order?")){
    db.collection("orders").doc(id).delete();
  }
}

</script>

</body>
</html>
