<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload Product</title>

<style>
body{
  font-family:Arial;
  background:#f1f5f9;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  margin:0;
}

.formBox{
  background:white;
  padding:20px;
  width:300px;
  border-radius:10px;
}

h2{
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
  border:1px solid #ccc;
  border-radius:5px;
}

button{
  width:100%;
  padding:10px;
  background:#22c55e;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
</style>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>

<body>

<div class="formBox">

  <h2>➕ Upload Product</h2>

  <input type="text" id="name" placeholder="Product Name">
  <input type="number" id="price" placeholder="Price">
  <input type="text" id="image" placeholder="Image URL">

  <button onclick="uploadProduct()">Upload Now 🚀</button>

</div>

<script>
// 🔥 FIREBASE CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyCA49EYDbqUnYu1sXs0ETDMIGaWxtoxXOM",
  authDomain: "reselling-store-c103e.firebaseapp.com",
  databaseURL: "https://reselling-store-c103e-default-rtdb.firebaseio.com",
  projectId: "reselling-store-c103e",
  storageBucket: "reselling-store-c103e.firebasestorage.app",
  messagingSenderId: "411682468136",
  appId: "1:411682468136:web:79cc2b622148f42a62e01d"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const auth = firebase.auth();

// 🔐 ADMIN LIST (Fix)
const ADMIN_EMAILS = ["santoshking471@gmail.com", "sidarrani368@gmail.com"];

// 🔐 ADMIN CHECK
auth.onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  // ✅ Multi-admin fix
  if (!ADMIN_EMAILS.includes(user.email.toLowerCase())) {
    alert("Not Admin 😤");
    auth.signOut();
    window.location.href = "index.html";
    return;
  }
  
  console.log("Admin Verified: Ready to upload! 🚀");
});

// 🚀 UPLOAD FUNCTION
function uploadProduct(){
  const btn = document.querySelector("button");
  let name = document.getElementById("name").value.trim();
  let price = document.getElementById("price").value.trim();
  let image = document.getElementById("image").value.trim();

  if(!name || !price || !image){
    alert("Saare fields bharo bhai! 😒");
    return;
  }

  // Button disable taaki baar baar click na ho
  btn.innerText = "Uploading... ⏳";
  btn.disabled = true;

  db.collection("products").add({
    name: name,
    price: Number(price),
    image: image,
    createdAt: firebase.firestore.FieldValue.serverTimestamp() // Sahi timestamp format
  })
  .then(()=>{
    alert("Product Uploaded Successfully 😎🔥");

    // Clear form
    document.getElementById("name").value="";
    document.getElementById("price").value="";
    document.getElementById("image").value="";
    
    btn.innerText = "Upload Now 🚀";
    btn.disabled = false;
  })
  .catch(err => {
    console.error(err);
    alert("Error: " + err.message);
    btn.innerText = "Upload Now 🚀";
    btn.disabled = false;
  });
}
</script>


</body>
</html>
