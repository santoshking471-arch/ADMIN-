<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Staff</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f0f4ff;
        margin: 0;
        padding: 0;
    }

    .header {
        background-color: #0b2e6f;
        color: #fff;
        padding: 20px;
        font-size: 24px;
        font-weight: bold;
        text-align: center;
        box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        position: relative;
        z-index: 100;
    }

    .cards-container {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 20px;
        padding: 20px;
        position: relative;
        z-index: 1;
    }

    .staff-card {
        background-color: #fff;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        width: 300px;
        padding: 20px;
        transition: transform 0.2s;
        position: relative;
        z-index: 5;
        pointer-events: auto;
    }

    .staff-card:hover {
        transform: translateY(-5px);
    }

    .staff-card h3 {
        margin: 0 0 10px 0;
        color: #0b2e6f;
    }

    .staff-card p {
        margin: 4px 0;
        font-size: 14px;
        color: #333;
    }

    .staff-card button {
        margin-top: 10px;
        padding: 15px; /* Thoda bada kiya tap ke liye */
        width: 100%;
        border: none;
        border-radius: 50px;
        font-size: 14px;
        cursor: pointer;
        font-weight: bold;
        transition: background 0.3s;
        position: relative;
        z-index: 9999 !important;
        touch-action: manipulation;
    }

    .approve-btn {
        background-color: #0b2e6f;
        color: #fff;
    }

    .deny-btn {
        background-color: #ff4d4d;
        color: #fff;
    }
</style>

</head>
<body>

<div class="header">Manage Staff</div>

<div class="cards-container" id="cardsContainer">
    Loading staff data...
</div>
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCA49EYDbqUnYu1sXs0ETDMIGaWxtoxXOM",
    authDomain: "reselling-store-c103e.firebaseapp.com",
    databaseURL: "https://reselling-store-c103e-default-rtdb.firebaseio.com",
    projectId: "reselling-store-c103e",
    storageBucket: "reselling-store-c103e.appspot.com", // Fixed bucket
    messagingSenderId: "411682468136",
    appId: "1:411682468136:web:79cc2b622148f42a62e01d"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  auth.onAuthStateChanged(user => {
      if(!user){
          // window.location.href = "index.html"; // Isko testing ke liye abhi comment rakh sakte ho
          loadStaffCards(); // For testing
          return;
      }
      
      // Admin check logic
      const adminEmail = user.email;
      if(adminEmail === "santoshking471@gmail.com" || adminEmail === "sidarrani368@gmail.com") {
          loadStaffCards();
      } else {
          alert("Aap admin nahi ho!");
          auth.signOut();
      }
  });

  function loadStaffCards(){
      const container = document.getElementById("cardsContainer");
      // staffRequests collection se data uthana hai jo register se aaya hai
      db.collection("staffRequests").onSnapshot(snapshot => {
          container.innerHTML = snapshot.empty ? "No requests found." : "";
          snapshot.forEach(doc => {
              const data = doc.data();
              const card = document.createElement("div");
              card.className = "staff-card";

              card.innerHTML = `
                <h3>${data.fullName}</h3>
                <p><strong>Email:</strong> ${data.email}</p>
                <p><strong>Mobile:</strong> ${data.mobile}</p>
                <p><strong>Status:</strong> ${data.status || 'Pending'}</p>
                <button class="approve-btn" onclick="approveStaff('${doc.id}')">Approve Now</button>

                <button class="deny-btn" onclick="deleteRequest('${doc.id}')">Reject</button>
              `;
              container.appendChild(card);
          });
      });
  }

  // --- APPROVE LOGIC ---
  function approveStaff(id) {
    if(confirm("Bhai, is staff ko approve kar dein?")) {
        // Step 1: Request data fetch karein
        db.collection("staffRequests").doc(id).get().then(doc => {
            if (doc.exists) {
                const data = doc.data();
                data.approved = true; // Status update kiya

                // Step 2: 'staff' collection mein save karein
                db.collection("staff").doc(id).set(data).then(() => {
                    
                    // Step 3: 'staffRequests' se delete karein
                    db.collection("staffRequests").doc(id).delete().then(() => {
                        alert("Staff Approved and Moved! ✅");
                        loadStaffCards(); // UI refresh karne ke liye
                    });

                }).catch(err => alert("Saving error: " + err.message));
            } else {
                alert("Bhai, ye staff request mili hi nahi!");
            }
        }).catch(err => alert("Fetch error: " + err.message));
    }
}


  function deleteRequest(id) {
      if(confirm("Reject kar dein?")) {
          db.collection("staffRequests").doc(id).delete()
          .then(() => alert("Request Rejected."));
      }
  }
</script>


</body>
</html>
