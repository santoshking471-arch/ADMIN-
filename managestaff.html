<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f0f4ff; margin: 0; padding: 0; }
        .header { background-color: #0b2e6f; color: #fff; padding: 20px; font-size: 24px; font-weight: bold; text-align: center; }
        .cards-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; padding: 20px; }
        .staff-card { background-color: #fff; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); width: 300px; padding: 20px; }
        .staff-card h3 { margin: 0 0 10px 0; color: #0b2e6f; }
        .staff-card p { margin: 4px 0; font-size: 14px; color: #333; }
    </style>
</head>
<body>

<div class="header">Approved Staff Members</div>
<div class="cards-container" id="cardsContainer">Loading data...</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyCA49EYDbqUnYu1sXs0ETDMIGaWxtoxXOM",
        projectId: "reselling-store-c103e",
        // ... (baki config wahi rahega)
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    const container = document.getElementById("cardsContainer");

    // Seedha 'staffRequests' se data load kar rahe hain
    db.collection("staffRequests").onSnapshot(snapshot => {
        container.innerHTML = ""; 
        
        if (snapshot.empty) {
            container.innerHTML = "<p>Koi data nahi mila!</p>";
            return;
        }

        snapshot.forEach(doc => {
            const data = doc.data();
            const card = document.createElement("div");
            card.className = "staff-card";
            card.innerHTML = `
                <h3>${data.fullName}</h3>
                <p><strong>Email:</strong> ${data.email}</p>
                <p><strong>Mobile:</strong> ${data.mobile}</p>
                <p><strong>Status:</strong> ${data.status || 'Pending'}</p>
            `;
            container.appendChild(card);
        });
    });
</script>
</body>
</html>
