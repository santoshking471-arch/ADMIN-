<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Staff Management | TYFENIX</title>
<style>
    /* Slim & App Style Fixes */
    * {
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
        user-select: none;
    }

    body, html {
        margin: 0; padding: 0; height: 100%;
        font-family: 'Segoe UI', Roboto, sans-serif;
        background: #f4f7fa; color: #333; overflow-x: hidden;
    }

    /* Header Slim */
    .header {
        position: fixed; top: 0; width: 100%; height: 55px;
        background: #0b2e6f; color: #fff; display: flex;
        justify-content: center; align-items: center;
        box-shadow: 0 2px 8px rgba(0,0,0,0.2); z-index: 1000;
    }
    .logo-text { font-size: 17px; font-weight: 800; letter-spacing: 1px; }

    /* Tab Layout Slim */
    .tabs {
        display: flex; position: fixed; top: 55px; width: 100%;
        background: #fff; border-bottom: 1px solid #ddd; z-index: 999;
    }
    .tab {
        flex: 1; text-align: center; padding: 12px;
        font-size: 13px; font-weight: 700; color: #777;
        cursor: pointer; transition: 0.3s;
    }
    .tab.active { color: #0b2e6f; border-bottom: 3px solid #0b2e6f; }

    /* Content Area */
    .container { padding: 115px 12px 20px; display: none; }
    .container.active { display: block; }

    /* Slim Card Design */
    .user-card {
        background: #fff; padding: 12px; border-radius: 10px;
        margin-bottom: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.06);
        border: 1px solid #eee;
    }
    .user-card h4 { margin: 0; font-size: 15px; color: #0b2e6f; }
    .user-card p { margin: 3px 0; font-size: 12px; color: #666; word-break: break-all; }
    
    /* Buttons Slim */
    .actions { display: flex; gap: 6px; margin-top: 10px; }
    .btn {
        flex: 1; padding: 8px; border-radius: 6px; border: none;
        font-size: 11px; font-weight: bold; color: #fff; cursor: pointer;
    }
    .btn-del { background: #e74c3c; } /* Red */
    .btn-block { background: #f1c40f; color: #000; } /* Yellow */
    .btn-approve { background: #27ae60; } /* Green */
    .btn-reject { background: #95a5a6; } /* Grey */

    .empty { text-align: center; color: #aaa; font-size: 12px; margin-top: 40px; }
</style>
</head>
<body>

<div class="header">
    <div class="logo-text">STAFF PANEL</div>
</div>

<div class="tabs">
    <div class="tab active" onclick="switchTab(event, 'manage')">Manage Staff</div>
    <div class="tab" onclick="switchTab(event, 'requests')">Requests</div>
</div>

<div id="manage" class="container active">
    <div id="staffList"><div class="empty">Loading...</div></div>
</div>

<div id="requests" class="container">
    <div id="requestList"><div class="empty">Scanning for requests...</div></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyCA49EYDbqUnYu1sXs0ETDMIGaWxtoxXOM",
    authDomain: "reselling-store-c103e.firebaseapp.com",
    projectId: "reselling-store-c103e",
    storageBucket: "reselling-store-c103e.appspot.com",
    messagingSenderId: "411682468136",
    appId: "1:411682468136:web:79cc2b622148f42a62e01d"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  function switchTab(e, id) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
      e.target.classList.add('active');
      document.getElementById(id).classList.add('active');
  }

  // --- Manage Staff Logic ---
  db.collection("staff").onSnapshot(snap => {
      const list = document.getElementById("staffList");
      list.innerHTML = snap.empty ? '<div class="empty">No approved staff.</div>' : "";
      snap.forEach(doc => {
          const u = doc.data();
          list.innerHTML += `
            <div class="user-card">
                <h4>${u.fullName}</h4>
                <p>📧 ${u.email}</p>
                <p>📞 ${u.mobile}</p>
                <div class="actions">
                    <button class="btn btn-block" onclick="toggleBlock('${doc.id}', ${u.blocked})">
                        ${u.blocked ? 'Unblock' : 'Block'}
                    </button>
                    <button class="btn btn-del" onclick="deleteStaff('${doc.id}')">Delete</button>
                </div>
            </div>`;
      });
  });

  // --- Requests Logic ---
  db.collection("staffRequests").onSnapshot(snap => {
      const list = document.getElementById("requestList");
      list.innerHTML = snap.empty ? '<div class="empty">No pending requests.</div>' : "";
      snap.forEach(doc => {
          const r = doc.data();
          list.innerHTML += `
            <div class="user-card" style="border-left: 4px solid #f1c40f;">
                <h4>${r.fullName}</h4>
                <p>📧 ${r.email}</p>
                <p>📞 ${r.mobile}</p>
                <div class="actions">
                    <button class="btn btn-approve" onclick="approveUser('${doc.id}')">Approve</button>
                    <button class="btn btn-reject" onclick="deleteReq('${doc.id}')">Reject</button>
                </div>
            </div>`;
      });
  });

  // Actions
  function approveUser(id) {
      db.collection("staffRequests").doc(id).get().then(doc => {
          const data = doc.data();
          data.approved = true;
          data.blocked = false;
          // Step 1: Move to staff collection
          db.collection("staff").doc(id).set(data).then(() => {
              // Step 2: Delete from requests
              db.collection("staffRequests").doc(id).delete();
              alert("User Approved Successfully!");
          });
      });
  }

  function deleteReq(id) {
      if(confirm("Reject this request?")) db.collection("staffRequests").doc(id).delete();
  }

  function toggleBlock(id, status) {
      db.collection("staff").doc(id).update({ blocked: !status });
  }

  function deleteStaff(id) {
      if(confirm("Permanently delete this staff member?")) db.collection("staff").doc(id).delete();
  }
</script>
</body>
</html>
